name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy to production
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" <<'EOF'
            set -euo pipefail
            export PATH="/var/www/dispatcher/data/.nvm/versions/node/v20.20.2/bin:/usr/lib/ispnodejs/bin:/usr/local/bin:/usr/bin:/bin:/usr/games"
            export PM2_HOME="/var/www/dispatcher/data/.pm2"
            cd /var/www/dispatcher/data/www/aam-dispatch.kz
            git fetch --prune origin main
            git reset --hard origin/main
            /var/www/dispatcher/data/.nvm/versions/node/v20.20.2/bin/npm ci
            /var/www/dispatcher/data/.nvm/versions/node/v20.20.2/bin/npm run build
            /usr/lib/ispnodejs/bin/pm2 reload aam-dispatch --update-env
          EOF
