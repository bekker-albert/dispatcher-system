name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check domain
        run: npm run check:domain

      - name: Check project health
        run: npm run check:project

      - name: Build
        run: npm run build

      - name: Pack production build
        run: tar -czf "next-build-${GITHUB_SHA}.tar.gz" .next

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Upload production build
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          scp -i ~/.ssh/id_ed25519 -P "${DEPLOY_PORT}" "next-build-${GITHUB_SHA}.tar.gz" "${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/dispatcher/data/www/aam-dispatch.kz/next-build-${GITHUB_SHA}.tar.gz"

      - name: Deploy to production
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_SHA='${DEPLOY_SHA}' bash -s" <<'EOF'
            set -euo pipefail
            export PATH="/usr/lib/ispnodejs/bin:/usr/local/bin:/usr/bin:/bin:/usr/games"
            export PM2_HOME="/var/www/dispatcher/data/.pm2"
            cd /var/www/dispatcher/data/www/aam-dispatch.kz

            node -e 'const [major, minor] = process.versions.node.split(".").map(Number); if (major < 20 || (major === 20 && minor < 9)) { throw new Error(`Node ${process.versions.node} is too old for Next.js 16`); }'

            git fetch --prune origin main
            git cat-file -e "${DEPLOY_SHA}^{commit}"
            git reset --hard "${DEPLOY_SHA}"
            test "$(git rev-parse HEAD)" = "${DEPLOY_SHA}"
            npm ci --omit=dev --no-audit --no-fund

            next_archive="next-build-${DEPLOY_SHA}.tar.gz"
            next_tmp=".next-${DEPLOY_SHA}"
            next_previous=".next-previous-${DEPLOY_SHA}"
            rm -rf "${next_tmp}" "${next_previous}"
            mkdir "${next_tmp}"
            tar -xzf "${next_archive}" -C "${next_tmp}" --strip-components=1 .next
            test -f "${next_tmp}/BUILD_ID"

            rollback_next() {
              if [ -d "${next_previous}" ] && [ ! -d .next ]; then
                mv "${next_previous}" .next
              fi
            }
            trap rollback_next ERR INT TERM

            if [ -d .next ]; then
              mv .next "${next_previous}"
            fi
            mv "${next_tmp}" .next

            if /usr/lib/ispnodejs/bin/pm2 reload aam-dispatch --update-env; then
              trap - ERR INT TERM
              rm -rf "${next_previous}" "${next_archive}"
            else
              rm -rf .next
              if [ -d "${next_previous}" ]; then
                mv "${next_previous}" .next
              fi
              exit 1
            fi
          EOF

      - name: Production smoke
        env:
          PRODUCTION_SMOKE_URL: https://aam-dispatch.kz
          PRODUCTION_SMOKE_API_URL: https://www.aam-dispatch.kz
        run: npm run smoke:production
